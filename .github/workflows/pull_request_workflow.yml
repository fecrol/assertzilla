name: Pull Request Workflow

on:
  pull_request:
    branches:
      - main
      - 'assertzilla_version_*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile Code
        run:
          chmod +x mvnw
          ./mvnw clean compile